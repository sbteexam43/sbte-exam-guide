<button class="premium-custom-btn" onclick="alert('अभी यह सेक्शन तैयार हो रहा है! जल्द ही प्रीमियम नोट्स उपलब्ध होंगे।')">

    <script>
        // मास्टर डेटा स्ट्रक्चर (सभी ब्रांचेस और सेमेस्टर्स के लिए)
        // सिंटैक्स संरचना: db["Branch Name"]["Semester Name"] = { syllabus: [], pyq: [], mcq: [] }
        const db = {};

        // सभी ब्रांचेस की डिफ़ॉल्ट लिस्ट बनाना
        const branches = ["Civil Engineering", "Electrical Engineering", "Electronics Engineering", "Mechanical Engineering", "Automobile Engineering"];
        const semesters = ["1st Semester", "2nd Semester", "3rd Semester", "4th Semester", "5th Semester", "6th Semester"];

        branches.forEach(b => {
            db[b] = {};
            semesters.forEach(s => {
                db[b][s] = { syllabus: [], pyq: [], mcq: [] };
            });
        });

        // ----------------------------------------------------------------------
        // संकलन डेटा: सैंपल लोड (आप सीधे इसी पैटर्न पर नया डेटा इंजेक्ट करेंगे)
        // ----------------------------------------------------------------------
        
        // सिविल इंजीनियरिंग - 1st Semester डेटा
        db["Civil Engineering"]["1st Semester"].syllabus.push({ subject: "Engineering Mathematics-I", url: "#" });
        db["Civil Engineering"]["1st Semester"].pyq.push({ subject: "Maths-1 (2024 Exam Paper)", url: "#" });
        db["Civil Engineering"]["1st Semester"].mcq.push({
            subject: "Maths-1 Quiz",
            questions: [
                { q: "d/dx (sin x) का मान क्या होता है?", opts: ["cos x", "-cos x", "tan x"], ans: 0 }
            ]
        });

        // इलेक्ट्रॉनिक्स इंजीनियरिंग - 3rd Semester डेटा
        db["Electronics Engineering"]["3rd Semester"].syllabus.push({ subject: "C Programming Syllabus", url: "#" });
        db["Electronics Engineering"]["3rd Semester"].pyq.push({ subject: "C Programming Paper 2025", url: "#" });
        db["Electronics Engineering"]["3rd Semester"].mcq.push({
            subject: "C Programming Basics",
            questions: [
                { q: "C भाषा में मुख्य फ़ंक्शन का क्या नाम है?", opts: ["start()", "main()", "program()"], ans: 1 }
            ]
        });


        // =========================================================================
        // कोर लॉजिक इंजन - इसे आपको छूने या बदलने की कोई आवश्यकता नहीं है!
        // =========================================================================
        
        window.onload = function() {
            initSession();
        };

        function processLogin() {
            const name = document.getElementById('studentName').value;
            const branch = document.getElementById('branchOpt').value;
            const sem = document.getElementById('semOpt').value;

            if(!name.trim() || !branch || !sem) {
                alert("कृपया अपना नाम, ब्रांच और सेमेस्टर तीनों सही-सही चुनें!");
                return;
            }

            localStorage.setItem('sbte_name', name);
            localStorage.setItem('sbte_branch', branch);
            localStorage.setItem('sbte_sem', sem);
            initSession();
        }

        function initSession() {
            const name = localStorage.getItem('sbte_name');
            const branch = localStorage.getItem('sbte_branch');
            const sem = localStorage.getItem('sbte_sem');

            if(name && branch && sem) {
                // स्क्रीन स्विच करें
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('dashBanner').style.display = "flex";
                document.getElementById('logoutBtn').style.display = "block";

                // लेबल सेट करें
                document.getElementById('lblStudentName').innerText = "स्वागत है, " + name + "!";
                document.getElementById('lblStudentTrack').innerText = branch + " | " + sem;
                
                // डेटा लोड करें
                renderDashboardData(branch, sem);
            } else {
                document.getElementById('loginScreen').style.display = "flex";
                document.getElementById('dashBanner').style.display = "none";
                document.getElementById('logoutBtn').style.display = "none";
            }
        }

        function processLogout() {
            localStorage.removeItem('sbte_name');
            localStorage.removeItem('sbte_branch');
            localStorage.removeItem('sbte_sem');
            
            // इनपुट बॉक्स रीसेट करें
            document.getElementById('studentName').value = "";
            document.getElementById('branchOpt').value = "";
            document.getElementById('semOpt').value = "";
            
            // क्विज़ बॉक्स छुपाएं
            document.getElementById('quiz-box-screen').style.display = "none";
            
            initSession();
        }

        function renderDashboardData(branch, sem) {
            const syllabusArea = document.getElementById('list-syllabus');
            const pyqArea = document.getElementById('list-pyq');
            const mcqArea = document.getElementById('list-mcq');

            syllabusArea.innerHTML = "";
            pyqArea.innerHTML = "";
            mcqArea.innerHTML = "";

            const targetData = db[branch]?.[sem] || { syllabus: [], pyq: [], mcq: [] };

            // 1. लोड सिलेबस
            if(targetData.syllabus.length === 0) {
                syllabusArea.innerHTML = `<div class="content-item"><span class="item-title">इस सेमेस्टर का सिलेबस जल्द अपलोड होगा।</span></div>`;
            } else {
                targetData.syllabus.forEach(item => {
                    syllabusArea.innerHTML += `
                        <div class="content-item">
                            <span class="item-title">${item.subject}</span>
                            <a href="${item.url}" target="_blank" class="action-link btn-cyan"><i class="fa-solid fa-download"></i> View Syllabus</a>
                        </div>`;
                });
            }

            // 2. लोड PYQ
            if(targetData.pyq.length === 0) {
                pyqArea.innerHTML = `<div class="content-item"><span class="item-title">प्रीवियस ईयर पेपर जल्द आ रहे हैं...</span></div>`;
            } else {
                targetData.pyq.forEach(item => {
                    pyqArea.innerHTML += `
                        <div class="content-item">
                            <span class="item-title">${item.subject}</span>
                            <a href="${item.url}" target="_blank" class="action-link btn-blue"><i class="fa-solid fa-file-pdf"></i> Open Paper</a>
                        </div>`;
                });
            }

            // 3. लोड MCQ
            if(targetData.mcq.length === 0) {
                mcqArea.innerHTML = `<div class="content-item"><span class="item-title">इस सेक्शन के टेस्ट लाइव होने वाले हैं।</span></div>`;
            } else {
                targetData.mcq.forEach((item, index) => {
                    mcqArea.innerHTML += `
                        <div class="content-item">
                            <span class="item-title">${item.subject}</span>
                            <button class="action-link btn-purple" onclick="triggerQuiz('${branch}', '${sem}', ${index})"><i class="fa-solid fa-play"></i> Start Quiz</button>
                        </div>`;
                });
            }
        }

        function toggleFolderZone(id, arrowId) {
            const target = document.getElementById(id);
            const isVisible = target.style.display === "flex";
            target.style.display = isVisible ? "none" : "flex";
            document.getElementById(arrowId).classList.toggle('rotate-arrow', !isVisible);
        }

        function triggerQuiz(branch, sem, index) {
            const quizItem = db[branch][sem].mcq[index];
            const screen = document.getElementById('quiz-box-screen');
            const title = document.getElementById('quiz-title');
            const renderArea = document.getElementById('quiz-questions-render');

            title.innerText = "🎯 " + quizItem.subject;
            renderArea.innerHTML = "";
            screen.style.display = "block";
            screen.scrollIntoView({ behavior: 'smooth' });

            quizItem.questions.forEach((qObj, qIdx) => {
                let optHtml = "";
                qObj.opts.forEach((opt, oIdx) => {
                    optHtml += `<button class="option-trigger" onclick="checkQuizAns(this, ${oIdx === qObj.ans})">${opt}</button>`;
                });
                renderArea.innerHTML += `
                    <div class="q-wrapper">
                        <div class="q-txt">Q${qIdx + 1}. ${qObj.q}</div>
                        <div>${optHtml}</div>
                    </div>`;
            });
        }

        function checkQuizAns(btn, isCorrect) {
            const container = btn.parentElement;
            const buttons = container.querySelectorAll('.option-trigger');
            buttons.forEach(b => b.disabled = true); // लॉक बटन

            if(isCorrect) {
                btn.classList.add('correct-ans');
            } else {
                btn.classList.add('wrong-ans');
            }
        }
    </script>

    </script>

<script>
    // ----------------------------------------------------------------------
    // SOUND EFFECTS ENGINE (सिस्टम में ऑडियो जोड़ने के लिए)
    // ----------------------------------------------------------------------
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // सही जवाब के लिए मधुर साउंड (Success Sound)
    function playCorrectSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(528, audioCtx.currentTime); // 528Hz standard healing/success tone
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    // गलत जवाब के लिए बज़ साउंड (Error Buzz Sound)
    function playWrongSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); // Low frequency buzz
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    // ----------------------------------------------------------------------
    // UI को अपग्रेड करना: Syllabus सेक्शन को MCQ प्रैक्टिस टेस्ट में बदलना
    // ----------------------------------------------------------------------
    function renderDashboardData(branch, sem) {
        const syllabusArea = document.getElementById('list-syllabus');
        const pyqArea = document.getElementById('list-pyq');
        const mcqArea = document.getElementById('list-mcq');

        syllabusArea.innerHTML = "";
        pyqArea.innerHTML = "";
        mcqArea.innerHTML = "";

        const targetData = db[branch]?.[sem] || { syllabus: [], pyq: [], mcq: [] };

        // 1. रिप्लेसमेंट: सिलेबस की जगह अब MCQ सब्जेक्ट्स लोड होंगे
        if(targetData.syllabus.length === 0) {
            syllabusArea.innerHTML = `<div class="content-item"><span class="item-title">इस सेमेस्टर के सब्जेक्ट्स जल्द लोड होंगे।</span></div>`;
        } else {
            targetData.syllabus.forEach((item, index) => {
                syllabusArea.innerHTML += `
                    <div class="content-item">
                        <span class="item-title"><i class="fa-solid fa-graduation-cap" style="color:#06b6d4;"></i> ${item.subject.replace(" Syllabus", "")}</span>
                        <button class="action-link btn-cyan" onclick="triggerQuiz('${branch}', '${sem}', ${index})"><i class="fa-solid fa-play"></i> Start MCQ Test</button>
                    </div>`;
            });
        }

        // 2. लोड PYQ पेपर
        if(targetData.pyq.length === 0) {
            pyqArea.innerHTML = `<div class="content-item"><span class="item-title">प्रीवियस ईयर पेपर जल्द आ रहे हैं...</span></div>`;
        } else {
            targetData.pyq.forEach(item => {
                pyqArea.innerHTML += `
                    <div class="content-item">
                        <span class="item-title">${item.subject}</span>
                        <a href="${item.url}" target="_blank" class="action-link btn-blue"><i class="fa-solid fa-file-pdf"></i> Open Paper</a>
                    </div>`;
            });
        }

        // 3. एक्स्ट्रा लाइव टेस्ट जोन
        if(targetData.mcq.length === 0) {
            mcqArea.innerHTML = `<div class="content-item"><span class="item-title">इस सेक्शन के टेस्ट लाइव होने वाले हैं।</span></div>`;
        } else {
            targetData.mcq.forEach((item, index) => {
                mcqArea.innerHTML += `
                    <div class="content-item">
                        <span class="item-title">${item.subject}</span>
                        <button class="action-link btn-purple" onclick="triggerQuiz('${branch}', '${sem}', ${index})"><i class="fa-solid fa-play"></i> Start Quiz</button>
                    </div>`;
                });
            }
        }

        // सही/गलत को परखने वाला नया फंक्शन (विजुअल और साउंड के साथ)
        function checkQuizAns(btn, isCorrect) {
            const container = btn.parentElement;
            const buttons = container.querySelectorAll('.option-trigger');
            
            // छात्र के क्लिक करने के बाद सभी ऑप्शंस को लॉक करें ताकि दोबारा क्लिक न हो
            buttons.forEach(b => b.disabled = true); 

            if(isCorrect) {
                btn.classList.add('correct-ans');
                playCorrectSound(); // सही साउंड बजाएं
            } else {
                btn.classList.add('wrong-ans');
                playWrongSound(); // गलत साउंड बजाएं
                
                // छात्र को सही उत्तर दिखाने के लिए सही बटन को हरा करें
                buttons.forEach(b => {
                    if(b.getAttribute('data-correct') === 'true') {
                        b.classList.add('correct-ans');
                    }
                });
            }
        }

        // अपडेटेड क्विज़ ट्रिगर इंजन जो 'data-correct' मार्क सेट करता है
        function triggerQuiz(branch, sem, index) {
            const quizItem = db[branch][sem].mcq[index];
            const screen = document.getElementById('quiz-box-screen');
            const title = document.getElementById('quiz-title');
            const renderArea = document.getElementById('quiz-questions-render');

            title.innerText = "🎯 " + quizItem.subject;
            renderArea.innerHTML = "";
            screen.style.display = "block";
            screen.scrollIntoView({ behavior: 'smooth' });

            quizItem.questions.forEach((qObj, qIdx) => {
                let optHtml = "";
                qObj.opts.forEach((opt, oIdx) => {
                    const isTrue = oIdx === qObj.ans;
                    optHtml += `<button class="option-trigger" data-correct="${isTrue}" onclick="checkQuizAns(this, ${isTrue})">${opt}</button>`;
                });
                renderArea.innerHTML += `
                    <div class="q-wrapper">
                        <div class="q-txt">Q${qIdx + 1}. ${qObj.q}</div>
                        <div>${optHtml}</div>
                    </div>`;
            });
        }

    // ----------------------------------------------------------------------

    // ----------------------------------------------------------------------
    
    db["Electronics Engineering"]["3rd Semester"].syllabus = [
        { subject: "Principles of Electronics Communication Syllabus" },

                { q: "AM का पूर्ण रूप क्या है?", opts: ["Audio Modulation", "Amplitude Modulation", "Amplified Mode", "Alpha Modulation"], ans: 1 },
                { q: "FM में क्या स्थिर रहता है?", opts: ["आवृत्ति (Frequency)", "आयाम (Amplitude)", "फेज (Phase)", "इनमें से कोई नहीं"], ans: 1 }
                // इसी तरह आप इसके आगे जितने चाहें सवाल जोड़ते जा सकते हैं...
            ]
        },

            questions: [

            ]
        },

        {

            questions: [
                { q: "Inverter किस गेट को कहा जाता है?", opts: ["AND Gate", "OR Gate", "NAND Gate", "NOT Gate"], ans: 3 },
                { q: "Universal Gate कौन सा है?", opts: ["AND", "OR", "NAND", "XOR"], ans: 2 }
            ]
        },
        // 4. Measuring Instruments and Sensors
        {
            subject: "Measuring Instruments and Sensors MCQ Test",
            questions: [
                { q: "CRO का फुल फॉर्म क्या होता है?", opts: ["Cathode Ray Oscilloscope", "Computer Record Output", "Central Radio Officer", "Control Resistance Output"], ans: 0 },
                { q: "Multimeter से क्या नहीं नापा जा सकता?", opts: ["Current", "Voltage", "Resistance", "Frequency"], ans: 3 }

<script>
    // ----------------------------------------------------------------------
    // 1. UI अपग्रेड: लॉगिन स्क्रीन में फोटो अपलोड का ऑप्शन जोड़ना
    // ----------------------------------------------------------------------
    const loginBox = document.querySelector('.login-box');
    if (loginBox) {
        // पुराने बटन से ठीक पहले फोटो अपलोड का इनपुट डालना
        const enterBtn = loginBox.querySelector('.enter-btn');
        const photoInputHTML = `
            <div style="margin: 10px 0; text-align: left;">
                <label style="font-size: 12px; color: #64748b; font-weight: 600; display: block; margin-bottom: 5px;">
                    <i class="fa-solid fa-camera"></i> अपना फेस फोटो अपलोड करें (Optional):
                </label>
                <input type="file" id="studentPhoto" accept="image/*" style="padding: 5px;">
            </div>
        `;
        enterBtn.insertAdjacentHTML('beforebegin', photoInputHTML);
    }

    // ----------------------------------------------------------------------
    // 2. लीडरबोर्ड के लिए HTML ढांचा तैयार करना (डैशबोर्ड के नीचे)
    // ----------------------------------------------------------------------
    const containerDiv = document.querySelector('.container');
    if (containerDiv) {
        const leaderboardHTML = `
            <div id="leaderboard-zone" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 25px; border-top: 6px solid #f59e0b;">
                <h3 style="color: #b45309; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                    <i class="fa-solid fa-trophy" style="color: #f59e0b;"></i> टॉपर्स लीडरबोर्ड (Top Performers)
                </h3>
                <div id="leaderboard-list" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
            </div>
        `;
        containerDiv.insertAdjacentHTML('beforeend', leaderboardHTML);
    }

    // ----------------------------------------------------------------------
    // 3. डेटाबेस और लॉगिन लॉजिक को फोटो के साथ अपडेट करना
    // ----------------------------------------------------------------------
    // डमी लीडरबोर्ड डेटा (टेस्टिंग के लिए ताकि खाली न दिखे)
    let localLeaderboardData = [
        { name: "रोहित कुमार", score: 9, total: 10, photo: "https://www.w3schools.com/howto/img_avatar.png", branch: "Electronics Engineering", sem: "3rd Semester" },
        { name: "अमित कुमार", score: 7, total: 10, photo: "https://www.w3schools.com/howto/img_avatar2.png", branch: "Electronics Engineering", sem: "3rd Semester" }
    ];

    // पुराने लॉगिन फंक्शन को रिप्लेस करना
    processLogin = function() {
        const name = document.getElementById('studentName').value;
        const branch = document.getElementById('branchOpt').value;
        const sem = document.getElementById('semOpt').value;
        const photoFile = document.getElementById('studentPhoto').files[0];

        if(!name.trim() || !branch || !sem) {
            alert("कृपया अपना नाम, ब्रांच और सेमेस्टर चुनें!");
            return;
        }

        localStorage.setItem('sbte_name', name);
        localStorage.setItem('sbte_branch', branch);
        localStorage.setItem('sbte_sem', sem);

        if (photoFile) {
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('sbte_photo', e.target.result); // बेस64 फॉर्मेट में फोटो सेव
                initSession();
            };
            reader.readAsDataURL(photoFile);
        } else {
            localStorage.setItem('sbte_photo', "https://www.w3schools.com/howto/img_avatar.png"); // डिफ़ॉल्ट अवतार
            initSession();
        }
    };

    // ----------------------------------------------------------------------
    // 4. क्विज़ सबमिट होने पर लीडरबोर्ड अपडेट करने का लॉजिक
    // ----------------------------------------------------------------------
    // पुराने चेक आंसर को ओवरराइड करके स्कोर ट्रैक करना
    let currentQuizCorrectAnswers = 0;
    
    const originalTriggerQuiz = triggerQuiz;
    triggerQuiz = function(branch, sem, index) {
        currentQuizCorrectAnswers = 0; // नया क्विज़ शुरू होने पर स्कोर रीसेट
        originalTriggerQuiz(branch, sem, index);
        
        // क्विज़ विंडो के बंद करने वाले बटन को 'रिजल्ट सबमिट' में बदलना
        const quizBox = document.getElementById('quiz-box-screen');
        const closeBtn = quizBox.querySelector('.enter-btn');
        closeBtn.innerText = "अपना स्कोर लीडरबोर्ड में जोड़ें";
        closeBtn.onclick = function() {
            const name = localStorage.getItem('sbte_name');
            const uBranch = localStorage.getItem('sbte_branch');
            const uSem = localStorage.getItem('sbte_sem');
            const uPhoto = localStorage.getItem('sbte_photo');
            const quizItem = db[branch][sem].mcq[index];
            
            // लीडरबोर्ड एरे में नया स्कोर पुश करना
            localLeaderboardData.push({
                name: name,
                score: currentQuizCorrectAnswers,
                total: quizItem.questions.length,
                photo: uPhoto,
                branch: uBranch,
                sem: uSem
            });
            
            // स्कोर के हिसाब से सॉर्ट करना (सबसे ज्यादा सही वाला ऊपर)
            localLeaderboardData.sort((a, b) => b.score - a.score);
            
            // दोबारा रेंडर करें
            drawLeaderboard();
            quizBox.style.display = 'none';
        };
    };

    // आंसर चेक करने वाले फंक्शन को अपग्रेड करना ताकि सही स्कोर गिना जा सके
    const originalCheckQuizAns = checkQuizAns;
    checkQuizAns = function(btn, isCorrect) {
        if (isCorrect) {
            currentQuizCorrectAnswers++;
        }
        originalCheckQuizAns(btn, isCorrect);
    };

    // लीडरबोर्ड को स्क्रीन पर ड्रा (Render) करने का फंक्शन
    function drawLeaderboard() {
        const listArea = document.getElementById('leaderboard-list');
        if (!listArea) return;
        listArea.innerHTML = "";

        const currentBranch = localStorage.getItem('sbte_branch');
        const currentSem = localStorage.getItem('sbte_sem');

        // सिर्फ उसी ब्रांच और सेमेस्टर के लोगों को फ़िल्टर करके दिखाना
        const filteredData = localLeaderboardData.filter(user => user.branch === currentBranch && user.sem === currentSem);

        if(filteredData.length === 0) {
            listArea.innerHTML = `<div style="text-align:center; color:#64748b; font-size:13px;">अभी इस सेमेस्टर का कोई स्कोर उपलब्ध नहीं है। पहला टेस्ट देकर रैंक #1 लाएं!</div>`;
            return;
        }

        filteredData.forEach((user, idx) => {
            let medal = `<span style="font-weight:700; color:#64748b; width:25px;">#${idx + 1}</span>`;
            if (idx === 0) medal = `🥇`;
            if (idx === 1) medal = `🥈`;
            if (idx === 2) medal = `🥉`;

            listArea.innerHTML += `
                <div style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 10px 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        ${medal}
                        <img src="${user.photo}" alt="Face" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #f59e0b;">
                        <div>
                            <div style="font-weight: 600; font-size: 14px; color:#1e293b;">${user.name}</div>
                            <div style="font-size: 11px; color: #64748b;">${user.branch}</div>
                        </div>
                    </div>
                    <div style="background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 13px;">
                        Score: ${user.score} / ${user.total}
                    </div>
                </div>
            `;
        });
    }

    // इनिशियलाइज सेशन में लीडरबोर्ड को जोड़ना
    const originalInitSession = initSession;
    initSession = function() {
        originalInitSession();
        drawLeaderboard();
    };
</script>

            if (existingUser) {
                // अगर छात्र पहले से है, तो उसका नाम दोबारा जोड़ने के बजाय पुराने स्कोर में नया स्कोर जोड़ दें
                existingUser.score += currentQuizCorrectAnswers;
                existingUser.total += quizItem.questions.length;
            } else {
                // अगर छात्र पहली बार टेस्ट दे रहा है, तो नई एंट्री बनाएं
                localLeaderboardData.push({
                    name: name,
                    score: currentQuizCorrectAnswers,
                    total: quizItem.questions.length,
                    photo: uPhoto,
                    branch: uBranch,
                    sem: uSem
                });
            }
            
            // स्कोर के आधार पर सॉर्ट करें (सबसे ज्यादा टोटल नंबर वाला छात्र सबसे ऊपर)
            localLeaderboardData.sort((a, b) => b.score - a.score);
            
            // स्क्रीन पर लीडरबोर्ड को दोबारा साफ़ करके दिखाएं
            drawLeaderboard();
            quizBox.style.display = 'none';
        };
    };

    // ----------------------------------------------------------------------
    // 🎨 लीडरबोर्ड रेंडरर (UI रिफ्रेश)
    // ----------------------------------------------------------------------
    drawLeaderboard = function() {
        const listArea = document.getElementById('leaderboard-list');
        if (!listArea) return;
        listArea.innerHTML = "";

        const currentBranch = localStorage.getItem('sbte_branch');
        const currentSem = localStorage.getItem('sbte_sem');

        // सिर्फ वर्तमान ब्रांच और सेमेस्टर के छात्रों को फ़िल्टर करना
        const filteredData = localLeaderboardData.filter(user => user.branch === currentBranch && user.sem === currentSem);

        if(filteredData.length === 0) {
            listArea.innerHTML = `
                <div style="text-align:center; color:#64748b; font-size:13px; padding: 20px; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1;">
                    <i class="fa-solid fa-users" style="font-size: 24px; color: #94a3b8; margin-bottom: 8px; display: block;"></i>
                    अभी इस सेमेस्टर का कोई स्कोर उपलब्ध नहीं है। <br><b>पहला टेस्ट देकर रैंक #1 (🥇) पर अपना नाम लाएं!</b>
                </div>`;
            return;
        }

        // स्क्रीन पर रैंक के हिसाब से लिस्ट बनाना
        filteredData.forEach((user, idx) => {
            let medal = `<span style="font-weight:700; color:#64748b; width:25px;">#${idx + 1}</span>`;
            if (idx === 0) medal = `🥇`;
            if (idx === 1) medal = `🥈`;
            if (idx === 2) medal = `🥉`;

            listArea.innerHTML += `
                <div style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 10px 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 5px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        ${medal}
                        <img src="${user.photo}" alt="Face" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #f59e0b;">
                        <div>
                            <div style="font-weight: 600; font-size: 14px; color:#1e293b;">${user.name}</div>
                            <div style="font-size: 11px; color: #64748b;">${user.branch}</div>
                        </div>
                    </div>
                    <div style="background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 13px;">
                        Total Score: ${user.score} / ${user.total}
                    </div>
                </div>
            `;
        });
    };

    // तुरंत स्क्रीन को क्लीन करके अपडेट लागू करें
    drawLeaderboard();
</script>

<script>
window.addEventListener('load', () => {
    setTimeout(() => {
        const savedName = localStorage.getItem('sbte_name');
        const savedBranch = localStorage.getItem('sbte_branch');
        const savedAvatar = localStorage.getItem('sbte_avatar');

        if (savedName && savedAvatar) {
            // 1. लीडरबोर्ड में जहाँ नाम लिखा है, उसे ढूंढना
            const leaderboardCards = document.querySelectorAll('.main-container div, #main-portal div, .welcome-msg ~ div');
            
            // पूरे पेज पर लीडरबोर्ड के कार्ड को ऑटो-अपडेट करना
            document.querySelectorAll('div').forEach(div => {
                if (div.innerText && (div.innerText.includes('Shivam kumar') || div.innerText.includes('Shivamकुमार'))) {
                    // नाम और ब्रांच बदलना
                    div.innerHTML = div.innerHTML.replace(/Shivam\s*kumar/i, savedName);
                    if(savedBranch) {
                        div.innerHTML = div.innerHTML.replace(/Electronics\s*Engineering/i, savedBranch);
                    }
                    
                    // उस कार्ड के अंदर मौजूद पुरानी इमेज को हटाकर आपकी चुनी हुई असली फोटो लगाना
                    const img = div.querySelector('img');
                    if (img) {
                        img.src = savedAvatar;
                        img.style.objectFit = 'cover';
                        img.style.borderRadius = '50%';
                    }
                }
            });
        }
    }, 500); // पेज लोड होने के आधे सेकंड बाद यह कोड सब कुछ ऑटो-अपडेट कर देगा
});
</script>
<script>
(function() {

    setInterval(() => {
        const currentSavedAvatar = localStorage.getItem('sbte_avatar');
        
        // अगर छात्र ने कोई फोटो चुनी है, तो उसे पूरे पेज पर अपडेट करना
        if (currentSavedAvatar) {
            document.querySelectorAll('img').forEach(img => {
                // लॉगिन ग्रिड की 10 फोटो को छोड़कर, बाकी सभी जगह (लीडरबोर्ड आदि) असली फोटो सेट करना
                if (!img.classList.contains('addon-img')) {
                    if (img.src !== currentSavedAvatar) {
                        img.src = currentSavedAvatar;
                        img.style.objectFit = 'cover';
                        img.style.borderRadius = '50%';
                    }
                }
            });
        }

        // इनपुट बॉक्स में छात्र जो भी नाम लिख रहा है, उसे लाइव पकड़ना
        const textInputs = document.querySelectorAll('input[type="text"]');
        if (textInputs.length >= 1) {
            const typedName = textInputs[0].value.trim();
            if (typedName !== "") {
                localStorage.setItem('sbte_name', typedName);
            }
        }
        
        // ड्रॉपडाउन से ब्रांच का नाम लाइव पकड़ना
        const selectDropdown = document.querySelector('select');
        if (selectDropdown) {
            const typedBranch = selectDropdown.options[selectDropdown.selectedIndex].text;
            localStorage.setItem('sbte_branch', typedBranch);
        }

        // लीडरबोर्ड पर नाम और ब्रांच को लाइव बदलना
        const finalSavedName = localStorage.getItem('sbte_name');
        const finalSavedBranch = localStorage.getItem('sbte_branch');
        
        if (finalSavedName) {
            document.querySelectorAll('div, h3, p, span').forEach(el => {
                // अगर उसमें पुराना नाम "Shivam kumar" या "Shivam" दिख रहा है तो उसे छात्र के नाम से बदलना
                if (el.innerText && (el.innerText.includes('Shivam') || el.innerText.includes('shivam'))) {
                    el.innerHTML = el.innerHTML.replace(/Shivam\s*kumar/i, finalSavedName);
                    if (finalSavedBranch) {
                        el.innerHTML = el.innerHTML.replace(/Electronics\s*Engineering/i, finalSavedBranch);
                    }
                }
            });
        }
    }, 100);
})();
